<main class="flex-grow flex items-center justify-center relative px-6 py-section bg-radial-gradient">
<!-- Background Image Asset (Abstract Decorative) -->
<div class="absolute inset-0 z-0 overflow-hidden opacity-20">
<div class="absolute top-1/4 -right-20 w-[500px] h-[500px] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -left-20 w-[500px] h-[500px] bg-tertiary-container rounded-full blur-[120px]"></div>
</div>
<!-- Registration Card -->
<div class="relative z-10 w-full max-w-md">
<div class="glass-panel p-8 md:p-10 rounded-[20px] shadow-2xl">
<div class="mb-10 text-center">
<h1 class="font-h1 text-[32px] text-white mb-2">Create Account</h1>
<p class="font-body-md text-text-muted">Join the future of modern real estate</p>
</div>
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-caps text-on-surface-variant block ml-1" for="name">FULL NAME</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-slate-900/50 border border-white/10 rounded-[14px] py-4 pl-12 pr-4 text-white placeholder:text-text-dim focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label-caps text-on-surface-variant block ml-1" for="email">EMAIL ADDRESS</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-slate-900/50 border border-white/10 rounded-[14px] py-4 pl-12 pr-4 text-white placeholder:text-text-dim focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Phone -->
<div class="space-y-2">
<label class="font-label-caps text-on-surface-variant block ml-1" for="phone">PHONE NUMBER</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors" data-icon="call">call</span>
<input class="w-full bg-slate-900/50 border border-white/10 rounded-[14px] py-4 pl-12 pr-4 text-white placeholder:text-text-dim focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-caps text-on-surface-variant block ml-1" for="password">PASSWORD</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-slate-900/50 border border-white/10 rounded-[14px] py-4 pl-12 pr-4 text-white placeholder:text-text-dim focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-text-muted hover:text-white" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 rounded bg-slate-900 border-white/10 text-primary focus:ring-primary focus:ring-offset-background" id="terms" type="checkbox"/>
<label class="text-xs text-text-muted leading-tight" for="terms">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-dark text-on-primary font-button text-button rounded-[14px] hover:shadow-[0_8px_20px_-4px_rgba(232,101,26,0.5)] transition-all duration-300 active:scale-[0.98]" type="submit">
                        Complete Registration
                    </button>
</form>
<div class="mt-8 pt-6 border-t border-white/5 flex flex-col gap-4 items-center">
